version: "3.8"

services:
  provenance-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PROVENANCE_MODEL_PATH=/models/model.onnx
      - PROVENANCE_USE_ONNX=true
      - PROVENANCE_LOG_LEVEL=INFO
    volumes:
      - ../models:/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # GPU version (use with --profile gpu)
  provenance-api-gpu:
    profiles: ["gpu"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    ports:
      - "8000:8000"
    environment:
      - PROVENANCE_MODEL_PATH=/models/model.onnx
      - PROVENANCE_USE_ONNX=true
      - PROVENANCE_DEVICE=cuda
      - PROVENANCE_LOG_LEVEL=INFO
    volumes:
      - ../models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
